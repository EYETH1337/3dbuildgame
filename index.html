<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desert Code Builder</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.160.0?dev",
          "three/": "https://esm.sh/three@0.160.0&dev/",
          "htm": "https://esm.sh/htm@3.1.1",
          "framer-motion": "https://esm.sh/framer-motion@12.5.0?external=react,react-dom",
          "framer-motion/": "https://esm.sh/framer-motion@12.5.0&external=react,react-dom/",
          "leva": "https://esm.sh/leva@0.10.0?external=react,react-dom,@use-gesture/react",
          "maath": "https://esm.sh/maath@0.10.8?external=three",
          "maath/": "https://esm.sh/maath@0.10.8&external=three/",
          "postprocessing": "https://esm.sh/postprocessing@6.37.1?dev&external=three",
          "postprocessing/": "https://esm.sh/postprocessing@6.37.1&dev&external=three/",
          "cannon-es": "https://esm.sh/cannon-es@0.20.0",
          "tween.js": "https://esm.sh/@tweenjs/tween.js@21.0.0",
          "stats.js": "https://esm.sh/stats.js@0.17.0",
          "dat.gui": "https://esm.sh/dat.gui@0.7.9",
          "troika-three-text": "https://esm.sh/troika-three-text@0.49.0?external=three",
          "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.7.0?external=three",
          "rapier3d": "https://esm.sh/@dimforge/rapier3d@0.11.2?external=three",
          "three-csm": "https://esm.sh/three-csm@4.0.1?external=three",
          "three-bmfont-text": "https://esm.sh/three-bmfont-text@3.0.1?external=three",
          "three-pathfinding": "https://esm.sh/three-pathfinding@1.1.0?external=three"
        }
      }
    </script>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        background: #2a1810;
      }
      
      #code-editor {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 350px;
        height: 400px;
        background: rgba(20, 20, 20, 0.95);
        border: 2px solid #d4a574;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        z-index: 1000;
      }
      
      #code-editor.visible {
        display: flex;
      }
      
      .editor-header {
        background: #d4a574;
        color: #1a1a1a;
        padding: 10px;
        font-weight: bold;
        border-radius: 6px 6px 0 0;
      }
      
      #code-input {
        flex: 1;
        background: #1a1a1a;
        color: #d4a574;
        border: none;
        padding: 15px;
        font-family: inherit;
        font-size: 14px;
        resize: none;
        outline: none;
      }
      
      .editor-buttons {
        padding: 10px;
        display: flex;
        gap: 10px;
      }
      
      .btn {
        padding: 8px 16px;
        background: #d4a574;
        color: #1a1a1a;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      
      .btn:hover {
        background: #e6b882;
      }
      
      #instructions {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: #d4a574;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px;
        border-radius: 8px;
        max-width: 300px;
      }
    </style>
  </head>
  <body>
    <div id="code-editor">
      <div class="editor-header">Building Code Editor</div>
      <textarea id="code-input" placeholder="// Write your building code here
// Example:
buildCube(0, 0, 0, '#ff6b35');
buildTower(5, 0, 5, 3);"></textarea>
      <div class="editor-buttons">
        <button class="btn" id="run-code">Build</button>
        <button class="btn" id="clear-builds">Clear</button>
        <button class="btn" id="close-editor">Close</button>
      </div>
    </div>
    
    <div id="instructions">
      <strong>Controls:</strong><br>
      WASD - Move<br>
      Space - Jump<br>
      E - Open Code Editor<br>
      Mouse - Look around
    </div>

    <script type="module" src="main.js"></script>
    <script src="https://storage.googleapis.com/rosebud_staticfiles/ChatManager.js"></script>
    <script src="https://storage.googleapis.com/rosebud_staticfiles/ImageGenerator.js"></script>
    <script src="https://storage.googleapis.com/rosebud_staticfiles/ProgressLogger.js"></script>
    <script src="https://storage.googleapis.com/rosebud_staticfiles/OGP.js"></script>
  </body>
</html>
