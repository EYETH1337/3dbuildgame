<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desert Code Builder</title>
    <!-- Local minimal Three.js implementation -->
    <script src="lib/three-minimal.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        background: #2a1810;
      }
      
      #code-editor {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 350px;
        height: 400px;
        background: rgba(20, 20, 20, 0.95);
        border: 2px solid #d4a574;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        z-index: 1000;
      }
      
      #code-editor.visible {
        display: flex;
      }
      
      .editor-header {
        background: #d4a574;
        color: #1a1a1a;
        padding: 10px;
        font-weight: bold;
        border-radius: 6px 6px 0 0;
      }
      
      #code-input {
        flex: 1;
        background: #1a1a1a;
        color: #d4a574;
        border: none;
        padding: 15px;
        font-family: inherit;
        font-size: 14px;
        resize: none;
        outline: none;
      }
      
      .editor-buttons {
        padding: 10px;
        display: flex;
        gap: 10px;
      }
      
      .btn {
        padding: 8px 16px;
        background: #d4a574;
        color: #1a1a1a;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      
      .btn:hover {
        background: #e6b882;
      }
      
      #instructions {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: #d4a574;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px;
        border-radius: 8px;
        max-width: 300px;
      }
    </style>
  </head>
  <body>
    <div id="code-editor">
      <div class="editor-header">Building Code Editor</div>
      <textarea id="code-input" placeholder="// Write your building code here
// Example:
buildCube(0, 0, 0, '#ff6b35');
buildTower(5, 0, 5, 3);"></textarea>
      <div class="editor-buttons">
        <button class="btn" id="run-code">Build</button>
        <button class="btn" id="clear-builds">Clear</button>
        <button class="btn" id="close-editor">Close</button>
      </div>
    </div>
    
    <div id="instructions">
      <strong>Controls:</strong><br>
      WASD - Move<br>
      Space - Jump<br>
      E - Open Code Editor<br>
      Mouse - Look around
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
